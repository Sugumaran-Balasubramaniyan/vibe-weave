# GlassBox Sentinel - Static Demo Configuration
# Serve the self-contained demo HTML file

server {
    listen 80;
    listen [::]:80;
    server_name glassbox.sugumaran-balasubramaniyan.com www.glassbox.sugumaran-balasubramaniyan.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name glassbox.sugumaran-balasubramaniyan.com www.glassbox.sugumaran-balasubramaniyan.com;
    
    # SSL Configuration (auto-renewed by Certbot)
    ssl_certificate /etc/letsencrypt/live/glassbox.sugumaran-balasubramaniyan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glassbox.sugumaran-balasubramaniyan.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security headers
    server_tokens off;
    include /etc/nginx/snippets/security-headers.conf;
    
    # Root directory
    root /var/www/glassbox;
    index demo-index.html;
    
    # Serve the demo page
    location / {
        try_files $uri $uri/ /demo-index.html =404;
    }
    
    # Cache static assets
    location ~* \.(css|js|html)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
    
    # Error pages
    error_page 404 /demo-index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
