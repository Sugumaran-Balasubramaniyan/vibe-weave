# GlassBox Sentinel - Full Backend Configuration
# Reverse proxy to FastAPI application

# HTTP redirect
server {
    listen 80;
    listen [::]:80;
    server_name glassbox.sugumaran-balasubramaniyan.com www.glassbox.sugumaran-balasubramaniyan.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name glassbox.sugumaran-balasubramaniyan.com www.glassbox.sugumaran-balasubramaniyan.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/glassbox.sugumaran-balasubramaniyan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glassbox.sugumaran-balasubramaniyan.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security headers
    server_tokens off;
    include /etc/nginx/snippets/security-headers.conf;
    
    # Increase client max body size for JSON payloads
    client_max_body_size 10M;
    
    # Proxy to FastAPI (running on localhost:8000)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Required for WebSocket/SSE support
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # Static files
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Keep mutable frontend assets fresh for the public hub.
        expires -1;
        add_header Cache-Control "no-cache";
        access_log off;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
    
    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
